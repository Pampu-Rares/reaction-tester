<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/styles.css">
    <link rel="stylesheet" href="./styles/targetTesterStyles.css">
    <link rel="icon" href="./media/reactionTesterFavicon.png" type="image/x-icon">
    <title>Target Tester</title>
</head>
<body>
    <main>
        <header>
            <button id="change-gamemode"><img src="./media/back-arrow.svg" alt="back"></button>
            <p>Difficulty: 
                <select id="difficulty-selector">
                    <option value="easy" selected>Easy</option>
                    <option value="medium">Medium</option>
                    <option value="hard">Hard</option>
                </select>
            </p>
            
            <button id="select-mode">Select mode</button>
        </header>
        <h1>Target tester</h1>
        <div id="screen-overlay">
            <div id="mode-selector-container">
                <h2>Select mode</h2>
                <div id="mode-selector">
                    <button id="single-player"><img src="./media/1-player.svg"></button>
                    <button id="2-player"><img src="./media/2-player.svg"></button>
                </div>
            </div>
            <div id="winner-dialog">
            </div>
        </div>
        <div id="app-container" class="blurred">
            <div id="minigame-container">
                <button id="play-btn">Play</button>
                <button id="target" class="easy-difficulty" tabindex="-1"><img src="./media/target.png" alt="target" draggable="false"></button>
            </div>
            <div id="scoreboard">
                <p>Targets missed:</p>
                <span id="targets-missed">0</span>
                <p>Targets hit:</p>
                <span id="targets-hit">0/20</span>
            </div>
            <div id="players-scores">
                <span>Player 1:</span>
                <span id="player-1-hits"></span>
                <span id="player-1-time"></span>
                <hr>
                <span>Player 2:</span>
                <span id="player-2-hits"></span>
                <span id="player-2-time"></span>
            </div>
            
            <div id="leaderboard-container">
                <span>Leaderboard</span>
                <table id="leaderboard">
                    
                </table>
            </div>
        </div>
        <dialog>
            <div id="new-leaderboard-entry-container">
                <button id="close-leaderboard-entry-container" class="close">X</button>
                <h3>You have set a new record!</h3>
                <label for="new-entry-name">
                    Enter your name:
                    <input type="text" maxlength="20" id="new-entry-name" placeholder="E.g: Ben Dover">
                </label>
                <p>Time: <span id="achieved-time-span"></span>s</p>
                <p>Difficulty: <span id="difficulty-span"></span></p>
                <p>Targets missed: <span id="targets-missed-record-span"></span>/20</p>
                <button type="button" id="submit-leaderboard-entry">Submit</button>
            <div>
        </dialog>
        </div>
    </main>
    <script src="scripts/leaderboardScripts/targetTesterLeaderboard.js"></script>
    <script src="scripts/targetTesterScript.js"></script>
</body>
</html>
