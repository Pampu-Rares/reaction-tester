<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Reaction Tester</title>
</head>
<body>
    <main>
        <div id="screen-overlay">
            <div id="mode-selecter-container">
                <h2>Select gamemode</h2>
                <div id="mode-selecter">
                    <button id="single-player"><img src="./media/1-player.svg"></button>
                    <button id="2-player"><img src="./media/2-player.svg"></button>
                </div>
            </div>
        </div>
        <p>Player <span id="player">1</span></p>
        <div id="minigame-container">
            <p id="info-span">Press to play</p>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
